<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>五子棋</h1>
        <div class="game-info">
            <div class="status">当前玩家: <span id="currentPlayer">黑棋</span></div>
            <button id="restartBtn" class="btn">重新开始</button>
        </div>
        <canvas id="gameBoard" width="600" height="600"></canvas>
        <div class="instructions">
            <h3>游戏规则</h3>
            <ul>
                <li>黑棋先行，双方轮流落子</li>
                <li>点击棋盘交叉点落子</li>
                <li>先连成五子（横、竖、斜）者获胜</li>
            </ul>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
